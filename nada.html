<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just for you</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #fbf3ec;
        --cream-deep: #f3e4d8;
        --blush: #f1c9c6;
        --blush-soft: #f6dad8;
        --rose: #b5495b;
        --rose-deep: #7a2f3d;
        --plum: #4a2536;
        --gold: #c9a265;
        --gold-soft: #e4d2ac;
        --ink: #4a2536;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow-x: hidden;
        background: linear-gradient(
          160deg,
          var(--cream) 0%,
          var(--cream-deep) 45%,
          var(--blush-soft) 100%
        );
        font-family: "EB Garamond", serif;
        color: var(--ink);
      }
      .display {
        font-family: "Cormorant Garamond", serif;
      }

      /* ---------- Floating ambient petals/hearts ---------- */
      .ambient {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 1;
      }
      .petal {
        position: absolute;
        top: -40px;
        opacity: 0.55;
        animation-name: drift, sway;
        animation-timing-function: linear, ease-in-out;
        animation-iteration-count: infinite, infinite;
      }
      .petal svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      @keyframes drift {
        from {
          transform: translateY(-10vh);
        }
        to {
          transform: translateY(110vh);
        }
      }
      @keyframes sway {
        0%,
        100% {
          margin-left: 0;
        }
        50% {
          margin-left: 40px;
        }
      }

      /* ---------- Sound toggle ---------- */
      .sound-toggle {
        position: fixed;
        top: 22px;
        right: 22px;
        z-index: 50;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid var(--gold-soft);
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          transform 0.3s ease,
          background 0.3s ease;
      }
      .sound-toggle:hover {
        transform: scale(1.08);
        background: rgba(255, 255, 255, 0.8);
      }
      .sound-toggle svg {
        width: 20px;
        height: 20px;
        fill: var(--rose-deep);
      }

      /* ---------- Scene 1: envelope ---------- */
      .scene {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        transition: opacity 0.9s ease;
      }
      .headline {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 500;
        font-size: clamp(20px, 3.4vw, 30px);
        letter-spacing: 0.5px;
        color: var(--rose-deep);
        text-align: center;
        margin-bottom: 56px;
        opacity: 0;
        animation: fadeUp 1.4s ease forwards 0.3s;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .envelope-wrap {
        position: relative;
        width: min(340px, 78vw);
        aspect-ratio: 3/2;
        cursor: pointer;
        opacity: 0;
        animation: fadeUp 1.4s ease forwards 0.7s;
      }
      .envelope-hint {
        text-align: center;
        margin-top: 26px;
        font-size: 15px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--rose);
        opacity: 0;
        animation:
          fadeUp 1.4s ease forwards 1.1s,
          pulseHint 2.4s ease-in-out infinite 2.1s;
      }
      @keyframes pulseHint {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }

      .envelope {
        position: absolute;
        inset: 0;
        background: linear-gradient(155deg, #fff 0%, var(--blush-soft) 100%);
        border-radius: 6px;
        box-shadow:
          0 18px 40px -12px rgba(122, 47, 61, 0.28),
          0 2px 8px rgba(122, 47, 61, 0.12);
        overflow: visible;
      }
      .flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 60%;
        background: linear-gradient(155deg, var(--blush) 0%, var(--rose) 120%);
        clip-path: polygon(0 0, 100% 0, 50% 85%);
        transform-origin: top;
        transition: transform 1.1s cubic-bezier(0.6, -0.1, 0.25, 1.2);
        border-radius: 6px 6px 0 0;
        z-index: 4;
      }
      .envelope-wrap.open .flap {
        transform: rotateX(178deg);
      }

      .letter-inside {
        position: absolute;
        left: 6%;
        right: 6%;
        bottom: 5%;
        height: 78%;
        background: var(--cream);
        border-radius: 3px;
        box-shadow: 0 -2px 10px rgba(122, 47, 61, 0.08);
        z-index: 2;
        transition: transform 1.15s cubic-bezier(0.3, 0.7, 0.2, 1) 0.25s;
      }
      .envelope-wrap.open .letter-inside {
        transform: translateY(-58%);
      }

      .seal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 35% 30%,
          #d78a95,
          var(--rose-deep) 70%
        );
        box-shadow: 0 4px 10px rgba(74, 37, 54, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
        transition:
          transform 0.6s ease,
          opacity 0.6s ease;
      }
      .seal svg {
        width: 26px;
        height: 26px;
        fill: var(--gold-soft);
      }
      .envelope-wrap.open .seal {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }
      .envelope-wrap:not(.open):hover .seal {
        transform: translate(-50%, -50%) scale(1.06);
      }

      /* ---------- Scene 2: letter ---------- */
      .letter-scene {
        position: fixed;
        inset: 0;
        z-index: 10;
        overflow-y: auto;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.1s ease;
      }
      .letter-scene.visible {
        opacity: 1;
        pointer-events: auto;
      }

uPYxi0dDCPHvHEsFyHZq+PmKkaHg+XEYrW8bS4NbtBpmud+JkntgDfi+Uiu0LMfAS3wl0NnaCqbEbP/gg2FW+I/s/MD6lZzCtEqDerubS+MV8zKwZToXs8dxI5YClS/wAVMcWaGa9+PJDQheTpu4mZjZ9IHs/cU6g0tRlXEAZLwmBJfYJKNOW4sksvGuyEFJWBW2zav8S0heq88e5//9k=");
        background-size: cover;
        background-position: center 20%;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      .photo-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(74, 37, 54, 0.55) 0%,
          rgba(74, 37, 54, 0.15) 28%,
          rgba(74, 37, 54, 0.35) 55%,
          rgba(35, 15, 22, 0.88) 100%
        );
      }

      .paper {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 640px;
        padding: 64px 32px 56px;
      }
      .paper-title {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(24px, 4vw, 32px);
        color: var(--gold-soft);
        margin-bottom: 26px;
        text-align: center;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.4);
      }
      .paper p {
        font-size: 18px;
        line-height: 38px;
        color: #fbf3ec;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transform: translateY(8px);
        animation: lineIn 0.9s ease forwards;
        margin-bottom: 2px;
        text-align: center;
      }
      @keyframes lineIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .sign-off {
        margin-top: 20px;
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 20px;
        color: var(--gold-soft);
        text-align: center;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transform: translateY(8px);
        animation: lineIn 0.9s ease forwards;
      }

      .close-letter {
        position: fixed;
        top: 14px;
        right: 16px;
        z-index: 20;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(74, 37, 54, 0.35);
        backdrop-filter: blur(3px);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fbf3ec;
        font-size: 22px;
        font-family: serif;
        transition: transform 0.2s ease;
      }
      .close-letter:hover {
        transform: rotate(90deg);
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient" id="ambient"></div>

    <div
      class="sound-toggle"
      id="soundToggle"
      role="button"
      aria-label="Toggle music"
      title="Toggle music"
    >
      <svg id="soundIconOn" viewBox="0 0 24 24" style="display: none">
        <path
          d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
        />
      </svg>
      <svg id="soundIconOff" viewBox="0 0 24 24">
        <path
          d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.94 8.94 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.19v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4l-1.88 1.88L12 7.76V4z"
        />
      </svg>
    </div>

    <section class="scene" id="scene1">
      <p class="headline display">just for you, because you deserve the best</p>

      <div class="envelope-wrap" id="envelopeWrap">
        <div class="letter-inside"></div>
        <div class="envelope"></div>
        <div class="flap"></div>
        <div class="seal">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 21s-8-4.6-8-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6.4-8 11-8 11z"
            />
          </svg>
        </div>
      </div>

      <p class="envelope-hint">tap to open</p>
    </section>

    <div class="letter-scene" id="letterScene">
      <button class="close-letter" id="closeLetter" aria-label="Close letter">
        ×
      </button>
      <div class="photo-bg">
        <div class="paper" id="paper">
          <p class="paper-title display">to you</p>
          <div id="letterLines"></div>
        </div>
      </div>
    </div>

    <script>
      const lines = [
        "I just wanted to tell you... I love you so, so much.",
        "You are the best thing that has ever happened to me.",
        "Maybe you don't fully feel it yet, but as long as you're with me, I'm happy.",
        "I'm never going to let you go, and I'll do everything I can to be the one you choose.",
        "I know you keep telling me to wait a year and six months, and I'm not against that at all.",
        "Because I love you. Really, truly, so much.",
      ];

      const letterLines = document.getElementById("letterLines");
      lines.forEach((line, i) => {
        const p = document.createElement("p");
        p.textContent = line;
        p.style.animationDelay = 0.15 * i + 0.2 + "s";
        letterLines.appendChild(p);
      });
      const signOff = document.createElement("p");
      signOff.className = "sign-off display";
      signOff.textContent = "— always yours";
      signOff.style.animationDelay = 0.15 * lines.length + 0.4 + "s";
      letterLines.appendChild(signOff);

      const ambient = document.getElementById("ambient");
      function heartSVG(color) {
        return `<svg viewBox="0 0 24 24"><path fill="${color}" d="M12 21s-8-4.6-8-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6.4-8 11-8 11z"/></svg>`;
      }
      const petalColors = ["#E7A9AE", "#D68490", "#F0C6C2", "#C97A88"];
      for (let i = 0; i < 14; i++) {
        const p = document.createElement("div");
        p.className = "petal";
        const size = 10 + Math.random() * 14;
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = Math.random() * 100 + "vw";
        const dur = 14 + Math.random() * 14;
        p.style.animationDuration = dur + "s, " + (3 + Math.random() * 3) + "s";
        p.style.animationDelay =
          -Math.random() * dur + "s, " + Math.random() * 2 + "s";
        p.innerHTML = heartSVG(petalColors[i % petalColors.length]);
        ambient.appendChild(p);
      }

      let audioCtx,
        gainNode,
        started = false,
        muted = false;
      function startAmbientAudio() {
        if (started) return;
        started = true;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.0001;
        gainNode.connect(audioCtx.destination);

        const freqs = [196.0, 246.94, 293.66];
        freqs.forEach((f, idx) => {
          const osc = audioCtx.createOscillator();
          osc.type = "sine";
          osc.frequency.value = f;
          const oGain = audioCtx.createGain();
          oGain.gain.value = idx === 0 ? 0.5 : 0.28;
          osc.connect(oGain);
          oGain.connect(gainNode);
          osc.start();

          const lfo = audioCtx.createOscillator();
          lfo.frequency.value = 0.05 + idx * 0.02;
          const lfoGain = audioCtx.createGain();
          lfoGain.gain.value = 2.5;
          lfo.connect(lfoGain);
          lfoGain.connect(osc.frequency);
          lfo.start();
        });

        gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 3);
        document.getElementById("soundIconOn").style.display = "block";
        document.getElementById("soundIconOff").style.display = "none";
      }
      function toggleMute() {
        if (!started) {
          startAmbientAudio();
          return;
        }
        muted = !muted;
        if (gainNode) {
          gainNode.gain.linearRampToValueAtTime(
            muted ? 0.0001 : 0.05,
            audioCtx.currentTime + 0.6,
          );
        }
        document.getElementById("soundIconOn").style.display = muted
          ? "none"
          : "block";
        document.getElementById("soundIconOff").style.display = muted
          ? "block"
          : "none";
      }
      document
        .getElementById("soundToggle")
        .addEventListener("click", toggleMute);

      const envelopeWrap = document.getElementById("envelopeWrap");
      const scene1 = document.getElementById("scene1");
      const letterScene = document.getElementById("letterScene");

      envelopeWrap.addEventListener("click", () => {
        if (envelopeWrap.classList.contains("open")) return;
        envelopeWrap.classList.add("open");
        startAmbientAudio();
        setTimeout(() => {
          scene1.style.opacity = "0";
          letterScene.classList.add("visible");
        }, 950);
      });

      document.getElementById("closeLetter").addEventListener("click", () => {
        letterScene.classList.remove("visible");
        setTimeout(() => {
          scene1.style.opacity = "1";
          envelopeWrap.classList.remove("open");
        }, 500);
      });
    </script>
  </body>
</html>
